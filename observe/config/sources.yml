version: 1

sources:
  - name: verifications
    database: payments_hf
    table: f_pvs_replica
    description: "Payment verification records (final state via transition table)"
    date_column: date
    columns:
      - name: country
      - name: verification_result
      - name: provider
      - name: payment_method
      - name: workflow
      - name: new_payment_method
    filters: []
    diagnosis:
      error_column: decline_response
      failure_filter: "verification_result = 'failed'"

  - name: checkout_funnel
    database: payments_hf
    table: payments_p0_metrics_checkout_funnel
    description: "Checkout funnel metrics"
    date_column: date_string_backwards
    columns:
      - name: country
      - name: payment_method_reporting
      - name: customer_count
      - name: is_pay_visit
      - name: is_success
      - name: is_select
    filters:
      - "is_different_checkout = FALSE"

  - name: orders
    database: payments_hf
    table: f_orders
    description: "Order-level payment data for PAR calculation"
    date_column: delivery_date
    columns:
      - name: country
      - name: first_provider
      - name: first_token
      - name: type_order
      - name: latest_status
      - name: product_type
    filters: []
    diagnosis:
      error_column: first_note
      failure_filter: "latest_status = 'canceled'"

  - name: checkout_funnel_backend
    database: payments_hf
    table: checkout_funnel_backend
    description: "Checkout funnel backend for FAR calculation"
    date_column: event_date
    columns:
      - name: country
      - name: payment_method
      - name: category
        expression: "fraudservice_last_payload.category"
      - name: event_attempted_fraud_check
      - name: event_fs_blocked
    filters: []
