version: 1

sources:
  - name: verifications
    database: payments_hf
    table: f_pvs_replica
    description: "Payment verification records (final state via transition table)"
    date_column: date
    columns:
      - name: country
      - name: verification_result
      - name: provider
      - name: payment_method
      - name: workflow
      - name: new_payment_method
    filters: []

  - name: checkout_funnel
    database: payments_hf
    table: payments_p0_metrics_checkout_funnel
    description: "Checkout funnel metrics"
    date_column: date_string_backwards
    columns:
      - name: country
      - name: payment_method_reporting
      - name: customer_count
      - name: is_pay_visit
      - name: is_success
      - name: is_select
    filters:
      - "is_different_checkout = FALSE"
