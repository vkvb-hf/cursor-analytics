version: 1

defaults:
  historical_lookback_days: 720
  refresh_lookback_days: 30
  alert_channels:
    - "#growth-pa-payments-alerts"

monitors:
  - name: tokenisation_monitor
    description: "TSR monitoring with auto-thresholds per workflow"
    severity: critical
    metrics:
      - tsr_checkout_tokenisation
      - tsr_reactivation
      - tsr_change
      - tsr_unpause
    dimensions:
      - [country, payment_method]
    hierarchy:
      - []
      - [country]
      - [country, payment_method]
    rules:
      auto_threshold:
        enabled: false
        type: auto_threshold
        comparison: same_weekday
        calibration_days: 365
        target_flag_rate: 0.03
        min_denominator: 30
        min_effective_volume: 10
        severity_map:
          critical: 3.0
          warning: 1.0
      zero_when_expected:
        enabled: true
        lookback_weeks: 4
        min_expected_weeks: 3
        min_denominator: 30
      large_deviation:
        enabled: true
        direction: decrease
        threshold_pct: 50
        lookback_weeks: 4
        min_denominator: 30
      follow_up:
        enabled: true

  - name: payment_approval_monitor
    description: "Payment Approval Rate monitoring with auto-thresholds"
    severity: critical
    metrics:
      - payment_approval_rate
    dimensions:
      - [country, first_provider, first_token, type_order]
    hierarchy:
      - []
      - [country]
      - [country, first_provider]
      - [country, first_provider, first_token]
      - [country, first_provider, first_token, type_order]
    rules:
      auto_threshold:
        enabled: false
        type: auto_threshold
        comparison: same_weekday
        calibration_days: 365
        target_flag_rate: 0.03
        min_denominator: 30
        min_effective_volume: 10
        severity_map:
          critical: 3.0
          warning: 1.0
      zero_when_expected:
        enabled: true
        lookback_weeks: 4
        min_expected_weeks: 3
        min_denominator: 30
      large_deviation:
        enabled: true
        direction: decrease
        threshold_pct: 50
        lookback_weeks: 4
        min_denominator: 30
      follow_up:
        enabled: true

  - name: fraud_approval_monitor
    description: "Fraud Approval Rate monitoring with auto-thresholds"
    severity: critical
    metrics:
      - fraud_approval_rate
    dimensions:
      - [country, category, payment_method]
    hierarchy:
      - []
      - [country]
      - [country, category]
      - [country, category, payment_method]
    rules:
      auto_threshold:
        enabled: false
        type: auto_threshold
        comparison: same_weekday
        calibration_days: 365
        target_flag_rate: 0.03
        min_denominator: 30
        min_effective_volume: 10
        severity_map:
          critical: 3.0
          warning: 1.0
      zero_when_expected:
        enabled: true
        lookback_weeks: 4
        min_expected_weeks: 3
        min_denominator: 30
      large_deviation:
        enabled: true
        direction: decrease
        threshold_pct: 50
        lookback_weeks: 4
        min_denominator: 30
      follow_up:
        enabled: true
